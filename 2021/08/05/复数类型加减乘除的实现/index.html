123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">编写人：naruuu</span></span><br><span class="line"><span class="comment">编写类型：复数类型实现 </span></span><br><span class="line"><span class="comment">编写时间：2020 9 20</span></span><br><span class="line"><span class="comment">要点：有能计算复数类型的数学基础 </span></span><br><span class="line"><span class="comment">本代码主要构建于建立结构体的基础之上利用结构体进行运算。</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">typedef</span> <span class="class"><span class="keyword">struct</span> <span class="title">complex</span>//构建复数的结构体类型（包含数部和虚部）</span></span><br><span class="line"><span class="class">&#123;</span></span><br><span class="line">	<span class="keyword">float</span> Realpart;</span><br><span class="line">	<span class="keyword">float</span> Imagepart;</span><br><span class="line">&#125;Complex;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">Create</span><span class="params">(Complex &amp;c,<span class="keyword">float</span> x,<span class="keyword">float</span> y)</span><span class="comment">//初始化</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	c.Realpart=x;</span><br><span class="line">	c.Imagepart=y;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">float</span> <span class="title">GetReal</span><span class="params">(Complex c)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">return</span> c.Realpart;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">float</span> <span class="title">GetImage</span><span class="params">(Complex c)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">return</span> c.Imagepart;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function">Complex <span class="title">Add</span><span class="params">(Complex c1,Complex c2)</span><span class="comment">//加法运算</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	Complex sum;</span><br><span class="line">	sum.Realpart=c1.Realpart+c2.Realpart;</span><br><span class="line">	sum.Imagepart=c1.Imagepart+c2.Imagepart;</span><br><span class="line">	<span class="keyword">return</span> sum;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function">Complex <span class="title">Sub</span><span class="params">(Complex c1,Complex c2)</span><span class="comment">//减法运算</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	Complex dif;</span><br><span class="line">	dif.Realpart=c1.Realpart-c2.Realpart;</span><br><span class="line">	dif.Imagepart=c1.Imagepart-c2.Imagepart;</span><br><span class="line">	<span class="keyword">return</span> dif;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function">Complex <span class="title">Mul</span><span class="params">(Complex c1,Complex c2)</span><span class="comment">//乘法运算</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	Complex cheng;</span><br><span class="line">	cheng.Realpart=c1.Realpart*c2.Realpart-c1.Imagepart*c2.Imagepart;</span><br><span class="line">	cheng.Imagepart=c1.Realpart*c2.Imagepart+c1.Imagepart*c2.Realpart;</span><br><span class="line">	<span class="keyword">return</span> cheng;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function">Complex <span class="title">Div</span><span class="params">(Complex c1,Complex c2)</span><span class="comment">//除法运算</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	Complex chu;</span><br><span class="line">	chu.Realpart=(c1.Realpart*c2.Realpart+c1.Imagepart*c2.Imagepart)/(c2.Realpart*c2.Realpart+c2.Imagepart*c2.Imagepart);</span><br><span class="line">	chu.Imagepart=(c1.Imagepart*c2.Realpart-c1.Realpart*c2.Imagepart)/(c2.Realpart*c2.Realpart+c2.Imagepart*c2.Imagepart);</span><br><span class="line">	<span class="keyword">if</span>((c2.Realpart*c2.Realpart+c2.Imagepart*c2.Imagepart)==<span class="number">0</span>)</span><br><span class="line">		<span class="built_in">printf</span>(<span class="string">&quot;the num doesnt exist&quot;</span>);</span><br><span class="line">	<span class="keyword">else</span></span><br><span class="line">	<span class="keyword">return</span> chu;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">Show</span><span class="params">(Complex c)</span><span class="comment">//复数类型的表示方法</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">if</span>(c.Realpart!=<span class="number">0</span>&amp;&amp;c.Imagepart!=<span class="number">0</span>)</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;%.2f+%.2fi&quot;</span>,c.Realpart,c.Imagepart);</span><br><span class="line">	<span class="keyword">else</span> <span class="keyword">if</span>(c.Realpart!=<span class="number">0</span>&amp;&amp;c.Imagepart==<span class="number">0</span>)</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;%.2f&quot;</span>,c.Realpart);</span><br><span class="line">	<span class="keyword">else</span> <span class="keyword">if</span>(c.Realpart==<span class="number">0</span>&amp;&amp;c.Imagepart!=<span class="number">0</span>)</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;%.2fi&quot;</span>,c.Imagepart);</span><br><span class="line">	<span class="keyword">else</span> <span class="keyword">if</span>(c.Realpart==<span class="number">0</span>&amp;&amp;c.Imagepart==<span class="number">0</span>)</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;%d&quot;</span>,<span class="number">0</span>);</span><br><span class="line">&#125; </span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">helpTestShow</span><span class="params">(Complex C1,Complex C2)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	Show(C1);<span class="built_in">printf</span>(<span class="string">&quot;\n&quot;</span>);Show(C2);<span class="built_in">printf</span>(<span class="string">&quot;\n&quot;</span>);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;he:&quot;</span>);Show(Add(C1,C2));<span class="built_in">printf</span>(<span class="string">&quot;\n&quot;</span>);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;cha:&quot;</span>);Show(Sub(C1,C2));<span class="built_in">printf</span>(<span class="string">&quot;\n&quot;</span>);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;ji:&quot;</span>);Show(Mul(C1,C2));<span class="built_in">printf</span>(<span class="string">&quot;\n&quot;</span>);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;shang:&quot;</span>);Show(Div(C1,C2));<span class="built_in">printf</span>(<span class="string">&quot;\n\n&quot;</span>);</span><br><span class="line">&#125;</span><br><span class=
